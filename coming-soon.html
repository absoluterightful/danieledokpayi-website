  <script>
    window.dataLayer=window.dataLayer||[];
    function gtag(){dataLayer.push(arguments);}
    gtag('js',new Date());
    gtag('config','AW-16511764603');
    function trackClick(label){if(typeof gtag==='function'){gtag('event','signup_click',{event_category:'Coming Soon Page',event_label:label});}}
    function toggleMenu(){document.body.classList.toggle('menu-open');}
    function validateSignup(event){
      const form = event.target;
      const input = form.querySelector('input[name="email"]');
      const message = document.getElementById('form-message');
      const email = input.value.trim().toLowerCase();
      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
      const blocked = ['test@test.com','test@gmail.com','fake@gmail.com','example@example.com','email@email.com','none@none.com'];
      const savedEmail = localStorage.getItem('comingSoonEmail');
      message.textContent = '';
      message.className = 'form-message';
      if(!emailPattern.test(email)){event.preventDefault();message.textContent='Please enter a valid email address.';message.classList.add('error');return false;}
      if(blocked.includes(email) || email.includes('fake') || email.includes('test')){event.preventDefault();message.textContent='Please use a real email address.';message.classList.add('error');return false;}
      if(savedEmail === email){event.preventDefault();message.textContent='This email is already signed up on this device.';message.classList.add('error');return false;}
      localStorage.setItem('comingSoonEmail', email);
      trackClick('Notify Me');
      return true;
    }
  </script>
